<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa do Site — Plataforma de Impactos BH Press</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14161a;
    --ink-soft:#5c6268;
    --ink-faint:#9aa0a6;
    --bg:#ffffff;
    --bg-sub:#f6f6f5;
    --card:#ffffff;
    --line:#e2e3e5;
    --blue:#00269f;
    --red:#ff6757;
    --teal:#1a3834;
    --orange:#ff9965;
    --gold:#caa400;
    --green:#3f9c63;
    --radius-lg:10px;
    --radius-md:7px;
    --radius-sm:4px;
    --shadow-sm:0 1px 2px rgba(15,17,20,.06);
    --shadow-md:0 6px 16px -8px rgba(15,17,20,.18);
    --ff-display:'Inter',system-ui,sans-serif;
    --ff-body:'Inter',system-ui,sans-serif;
    --ff-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }

  body{
    margin:0;
    font-family:var(--ff-body);
    color:var(--ink);
    background:var(--bg);
    line-height:1.45;
  }

  a{color:inherit;}

  /* ---------- Header ---------- */
  header.site-header{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:1180px;
    margin:0 auto;
    padding:14px 24px;
    display:flex;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand img{
    height:30px;
    width:auto;
    display:block;
  }
  .brand-divider{
    width:1px;
    height:30px;
    background:var(--line);
  }
  .brand-text h1{
    font-family:var(--ff-mono);
    font-size:.86rem;
    font-weight:600;
    margin:0;
    letter-spacing:-.01em;
  }
  .brand-text p{
    margin:2px 0 0;
    font-family:var(--ff-mono);
    font-size:.7rem;
    color:var(--ink-faint);
    letter-spacing:.01em;
  }
  .header-controls{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .search-box{
    position:relative;
    display:flex;
    align-items:center;
  }
  .search-box svg{
    position:absolute;
    left:11px;
    width:15px;
    height:15px;
    color:var(--ink-faint);
    pointer-events:none;
  }
  .search-box input{
    font-family:var(--ff-body);
    font-size:.84rem;
    padding:7px 12px 7px 32px;
    border-radius:var(--radius-sm);
    border:1px solid var(--line);
    background:#fff;
    width:200px;
    color:var(--ink);
    outline-offset:2px;
  }
  .search-box input:focus-visible{outline:2px solid var(--blue);}
  .search-box input::placeholder{color:var(--ink-faint);}
  .btn{
    font-family:var(--ff-body);
    font-size:.78rem;
    font-weight:600;
    padding:7px 13px;
    border-radius:var(--radius-sm);
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, border-color .15s ease;
  }
  .btn:hover{background:var(--bg-sub); border-color:var(--ink-faint);}
  .btn:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}
  .btn-primary{
    background:var(--bg-sub);
    color:var(--ink);
    border-color:var(--line);
  }
  .btn-primary:hover{background:#ededec;}

  /* brand stripe — quote of the colour bar used across the printed report */
  .stripe{
    height:6px;
    display:flex;
  }
  .stripe span{flex:1;}

  /* ---------- Layout ---------- */
  main{
    max-width:1180px;
    margin:0 auto;
    padding:38px 24px 70px;
  }

  .eyebrow{
    font-family:var(--ff-mono);
    font-size:.7rem;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin:0 0 14px;
  }

  /* ---------- Flow section ---------- */
  section.flow-section{
    margin-bottom:48px;
    padding-bottom:40px;
    border-bottom:1px solid var(--line);
  }

  .flow-chart{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .flow-hub{
    font-family:var(--ff-body);
    font-weight:600;
    font-size:.95rem;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:var(--radius-sm);
    padding:11px 26px;
    cursor:pointer;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    line-height:1.15;
    transition:background .15s ease;
  }
  .flow-hub:hover{background:#000;}
  .flow-hub:focus-visible{outline:2px solid var(--blue); outline-offset:3px;}
  .flow-hub-sub{font-size:.62rem; font-weight:500; font-family:var(--ff-mono); opacity:.65; letter-spacing:.04em; text-transform:uppercase; margin-top:2px;}
  .flow-hub::after{
    content:"";
    position:absolute;
    bottom:-22px;
    left:50%;
    width:1px;
    height:22px;
    background:var(--line);
    transform:translateX(-50%);
  }
  .flow-children{
    margin-top:22px;
    padding-top:22px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    width:fit-content;
    max-width:100%;
    position:relative;
  }
  .flow-node{
    position:relative;
    font-family:var(--ff-body);
    font-weight:500;
    font-size:.82rem;
    background:#fff;
    border:1px solid var(--line);
    border-top:2px solid var(--c,var(--ink));
    color:var(--ink);
    border-radius:var(--radius-sm);
    padding:9px 14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:border-color .15s ease, background .15s ease;
  }
  .flow-node:hover{background:var(--bg-sub);}
  .flow-node:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}
  .flow-node::before{
    content:"";
    position:absolute;
    top:-22px;
    left:50%;
    width:1px;
    height:22px;
    background:var(--line);
    transform:translateX(-50%);
  }
  .flow-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--c,var(--ink));
    flex:none;
  }
  @media (max-width:640px){
    .flow-node::before, .flow-hub::after{display:none;}
    .flow-children{border-top:none; padding-top:0;}
  }

  .flow-utility{
    margin-top:26px;
    font-family:var(--ff-body);
    font-size:.78rem;
    font-weight:500;
    color:var(--ink-soft);
    background:transparent;
    border:1px dashed var(--line);
    border-radius:var(--radius-sm);
    padding:8px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .flow-utility span{font-weight:400; color:var(--ink-faint);}
  .flow-utility:hover{border-color:var(--ink-faint); color:var(--ink);}
  .flow-utility:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

  /* ---------- Tree section ---------- */
  section.tree-section{margin-bottom:40px;}

  ul.trunks-root{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .node{position:relative;}

  /* Trunk (depth 0) card */
  li.node.trunk{
    background:var(--card);
    border:1px solid var(--line);
    border-left:4px solid var(--accent,var(--ink));
    border-radius:var(--radius-md);
    padding:2px 2px 2px 0;
  }
  li.node.trunk.utility{
    border-left-style:dashed;
    background:var(--bg-sub);
  }

  li.node.trunk > .node-row{
    padding:16px 18px 16px 16px;
    cursor:pointer;
    border-radius:var(--radius-md);
  }
  li.node.trunk > .node-row:hover{background:rgba(0,0,0,.015);}

  .trunk-icon{
    width:36px;height:36px;
    border-radius:var(--radius-sm);
    background:var(--bg-sub);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    flex:none;
  }
  .trunk-icon svg{width:18px;height:18px;color:var(--ink-soft);}

  /* generic node row */
  .node-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .node-row.clickable{cursor:pointer; border-radius:var(--radius-sm);}
  .node-row:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

  .toggle{
    flex:none;
    width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-faint);
    transition:transform .22s ease, color .15s ease;
    margin-top:3px;
  }
  .toggle svg{width:12px;height:12px;}
  .node-row.clickable:hover .toggle{color:var(--ink-soft);}
  [data-depth="0"] > .node-row .toggle{width:20px;height:20px; margin-top:5px;}
  [data-depth="0"] > .node-row .toggle svg{width:13px;height:13px;}
  .node.open > .node-row > .toggle{transform:rotate(90deg);}

  .bullet{
    flex:none;
    width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;
    margin-top:3px;
  }
  .bullet::after{
    content:"";
    width:4px;height:4px;
    background:var(--ink-faint);
  }

  .node-text{flex:1; min-width:0;}

  .node-title{
    font-family:var(--ff-body);
    font-weight:600;
    font-size:.93rem;
    color:var(--ink);
    margin-right:8px;
  }
  [data-depth="0"] > .node-row .node-title{
    font-weight:700;
    font-size:1.08rem;
    letter-spacing:-.005em;
    display:block;
    margin:1px 0 4px;
  }
  [data-depth="1"] > .node-row .node-title{font-size:.95rem; font-weight:700;}

  .pill{
    display:inline-flex;
    align-items:center;
    font-size:.66rem;
    font-weight:500;
    padding:2px 7px;
    border-radius:3px;
    margin:0 6px 4px 0;
    white-space:nowrap;
    font-family:var(--ff-mono);
    border:1px solid transparent;
  }
  .pill-comp{
    background:var(--bg-sub);
    color:var(--ink-soft);
    border-color:var(--line);
  }
  .pill-gri{
    background:#fff;
    color:var(--ink-soft);
    border-color:var(--line);
    letter-spacing:.01em;
  }
  .pill-count{
    background:transparent;
    color:var(--ink-faint);
    border-color:var(--line);
  }

  .node-note{
    margin:4px 0 0;
    font-size:.83rem;
    color:var(--ink-soft);
    max-width:60ch;
  }
  .node-note.objetivo{
    font-size:.95rem;
    color:var(--ink-soft);
    margin-bottom:8px;
  }

  .cross-wrap{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .chip-cross{
    font-family:var(--ff-body);
    font-size:.72rem;
    font-weight:500;
    color:var(--blue);
    background:transparent;
    border:1px solid rgba(0,38,159,.3);
    border-radius:3px;
    padding:3px 8px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .chip-cross:hover{background:rgba(0,38,159,.06);}
  .chip-cross:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

  /* collapse animation */
  .collapse{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .32s cubic-bezier(.4,0,.2,1);
  }
  .node.open > .collapse{grid-template-rows:1fr;}
  .collapse-inner{overflow:hidden;}
  li.node.trunk > .collapse > .collapse-inner{padding:0 20px 18px 18px;}
  .node:not(.trunk) > .collapse > .collapse-inner{padding-top:8px;}

  /* nested branch (tree lines) */
  ul.branch{
    list-style:none;
    margin:0 0 0 11px;
    padding:2px 0 2px 22px;
    border-left:2px solid rgba(var(--accent-rgb,21,23,28),.22);
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  ul.branch > .node{position:relative;}
  ul.branch > .node::before{
    content:"";
    position:absolute;
    left:-22px;
    top:13px;
    width:17px;height:2px;
    background:rgba(var(--accent-rgb,21,23,28),.22);
  }
  ul.branch ul.branch{margin-left:11px; padding-left:20px;}

  /* search */
  .search-hide{display:none !important;}
  .search-match > .node-row{
    background:rgba(255,209,0,.12);
    border-radius:3px;
    box-shadow:0 0 0 1px rgba(0,38,159,.3);
  }

  /* flash on cross-link jump */
  @keyframes flashPulse{
    0%{box-shadow:0 0 0 0 rgba(0,38,159,0);}
    25%{box-shadow:0 0 0 6px rgba(0,38,159,.14);}
    100%{box-shadow:0 0 0 0 rgba(0,38,159,0);}
  }
  li.node.trunk.flash{animation:flashPulse 1.3s ease;}

  /* ---------- Footer ---------- */
  footer.site-footer{
    border-top:1px solid var(--line);
    padding:20px 24px 32px;
  }
  .footer-inner{
    max-width:1180px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    font-size:.75rem;
    font-family:var(--ff-mono);
    color:var(--ink-faint);
  }

  /* ---------- responsive ---------- */
  @media (max-width:700px){
    .header-controls{width:100%; justify-content:flex-start;}
    .search-box input{width:140px;}
    li.node.trunk > .node-row{flex-wrap:wrap;}
    ul.branch{margin-left:4px; padding-left:16px;}
  }
</style>
</head>

  /* ====================== RENDER ====================== */

  /* helper: iterate NodeLists without relying on NodeList.prototype.forEach */
  function each(list, fn){
    for(var i = 0; i < list.length; i++){ fn(list[i], i); }
  }

  function escapeHTML(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function renderNode(node, depth){
    var li = document.createElement('li');
    li.className = 'node';
    li.dataset.depth = depth;
    if(node.id) li.id = node.id;

    if(depth === 0){
      li.classList.add('trunk');
      if(node.utility) li.classList.add('utility');
      li.style.setProperty('--accent', node.accent);
      li.style.setProperty('--accent-rgb', node.accentRgb);
    }

    var ownBits = [node.title, node.comp, node.gri, node.note, node.objetivo].filter(Boolean);
    li.dataset.own = ownBits.join(' ').toLowerCase();

    var hasKids = !!(node.children && node.children.length);

    var row = document.createElement('div');
    row.className = 'node-row';
    if(hasKids){
      row.classList.add('clickable');
      row.tabIndex = 0;
      row.setAttribute('role','button');
      row.setAttribute('aria-expanded','false');
    }

    var html = '';
    if(hasKids){
      html += '<span class="toggle" aria-hidden="true">' + TOGGLE_SVG + '</span>';
    } else {
      html += '<span class="bullet" aria-hidden="true"></span>';
    }
    if(depth === 0 && node.icon){
      html += '<span class="trunk-icon" aria-hidden="true">' + node.icon + '</span>';
    }

    var textHTML = '<span class="node-title">' + escapeHTML(node.title) + '</span>';
    if(depth === 0){
      textHTML += '<span class="pill pill-count" data-count-slot>—</span>';
    }
    if(node.comp){ textHTML += '<span class="pill pill-comp">' + escapeHTML(node.comp) + '</span>'; }
    if(node.gri){ textHTML += '<span class="pill pill-gri">' + escapeHTML(node.gri) + '</span>'; }

    var noteHTML = '';
    if(depth === 0 && node.objetivo){ noteHTML += '<p class="node-note objetivo">' + escapeHTML(node.objetivo) + '</p>'; }
    if(node.note){ noteHTML += '<p class="node-note">' + escapeHTML(node.note) + '</p>'; }

    var crossHTML = '';
    if(node.cross && node.cross.length){
      crossHTML = '<div class="cross-wrap">' + node.cross.map(function(c){
        return '<button type="button" class="chip-cross" data-to="' + c.to + '">→ ' + escapeHTML(c.label) + '</button>';
      }).join('') + '</div>';
    }

    html += '<div class="node-text">' + textHTML + noteHTML + crossHTML + '</div>';
    row.innerHTML = html;
    li.appendChild(row);

    if(hasKids){
      var collapse = document.createElement('div');
      collapse.className = 'collapse';
      var inner = document.createElement('div');
      inner.className = 'collapse-inner';
      var ul = document.createElement('ul');
      ul.className = 'branch';
      node.children.forEach(function(child){ ul.appendChild(renderNode(child, depth + 1)); });
      inner.appendChild(ul);
      collapse.appendChild(inner);
      li.appendChild(collapse);
    }

    return li;
  }

  var trunksRoot = document.getElementById('trunks');
  DATA.forEach(function(trunk){ trunksRoot.appendChild(renderNode(trunk, 0)); });

  /* fill block counts per trunk */
  each(document.querySelectorAll('li.node.trunk'), function(t){
    var count = t.querySelectorAll('.node').length;
    var slot = t.querySelector('[data-count-slot]');
    if(slot) slot.textContent = count + (count === 1 ? ' bloco' : ' blocos');
  });

  /* ====================== INTERAÇÕES ====================== */


  function setExpanded(li, open){
    li.classList.toggle('open', open);
    var row = li.querySelector('.node-row');
    if(row && row.classList.contains('clickable')){
      row.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
  }

  function toggleNode(li){ setExpanded(li, !li.classList.contains('open')); }

  function expandFully(li){
    setExpanded(li, true);
    each(li.querySelectorAll('.node'), function(n){ setExpanded(n, true); });
  }

  function clearSearch(){
    var input = document.getElementById('searchInput');
    input.value = '';
    each(document.querySelectorAll('.node'), function(n){
      n.classList.remove('search-hide','search-match');
    });
  }

  function jumpTo(id){
    var target = document.getElementById(id);
    if(!target) return;
    clearSearch();
    expandFully(target);
    target.scrollIntoView({ behavior:'smooth', block:'start' });
    target.classList.remove('flash');
    void target.offsetWidth;
    target.classList.add('flash');
    window.setTimeout(function(){ target.classList.remove('flash'); }, 1500);
  }

  document.getElementById('trunks').addEventListener('click', function(e){
    var chip = e.target.closest('.chip-cross');
    if(chip){ e.stopPropagation(); jumpTo(chip.dataset.to); return; }
    var row = e.target.closest('.node-row.clickable');
    if(row){ toggleNode(row.parentElement); }
  });

  document.getElementById('trunks').addEventListener('keydown', function(e){
    if(e.key !== 'Enter' && e.key !== ' ') return;
    var row = e.target.closest('.node-row.clickable');
    if(row){ e.preventDefault(); toggleNode(row.parentElement); }
  });

  each(document.querySelectorAll('.flow-hub, .flow-node, .flow-utility'), function(btn){
    btn.addEventListener('click', function(){ jumpTo(btn.dataset.jump); });
  });

  document.getElementById('btnExpandAll').addEventListener('click', function(){
    each(document.querySelectorAll('#trunks .node'), function(n){ setExpanded(n, true); });
  });
  document.getElementById('btnCollapseAll').addEventListener('click', function(){
    each(document.querySelectorAll('#trunks .node'), function(n){ setExpanded(n, false); });
  });

  var searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', function(){
    var q = searchInput.value.trim().toLowerCase();
    var nodes = document.querySelectorAll('#trunks .node');
    if(!q){
      each(nodes, function(n){ n.classList.remove('search-hide','search-match'); });
      return;
    }
    each(nodes, function(n){ n.classList.add('search-hide'); n.classList.remove('search-match'); });
    each(nodes, function(n){
      if(n.dataset.own && n.dataset.own.indexOf(q) !== -1){
        n.classList.remove('search-hide');
        n.classList.add('search-match');
        var cur = n;
        while(true){
          var branchUl = cur.parentElement;
          if(!branchUl || !branchUl.classList || !branchUl.classList.contains('branch')) break;
          var ancestor = branchUl.closest('.node');
          if(!ancestor) break;
          ancestor.classList.remove('search-hide');
          setExpanded(ancestor, true);
          cur = ancestor;
        }
      }
    });
  });

})();
</script>
</body>
</html>
